version: '2.4'  # The last version of Docker Compose file format that directly supports mem_limit and cpus
services:
  weather-api:
    container_name: weather-api
    image: 905418178670.dkr.ecr.eu-west-2.amazonaws.com/weather-api:latest
    ports:
      - "80:8080"
    restart: always
    mem_limit: 256M
    cpus: 0.5
